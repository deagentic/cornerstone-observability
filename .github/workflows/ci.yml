name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "{{ cookiecutter.python_version }}"

      - name: Install cornerstone
        run: pip install git+https://github.com/deagentic/cornerstone.git

      - name: Install cornerstone
        run: pip install git+https://github.com/deagentic/cornerstone.git
      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Import contracts
        run: lint-imports

      - name: ADR gate
        run: cornerstone adr-gate
        continue-on-error: false

      - name: Full suite with 100% coverage (non-negotiable)
        run: |
          pytest tests/ \
            --cov=src \
            --cov-branch \
            --cov-fail-under=100 \
            --cov-report=xml \
            --cov-report=term-missing \
            -q
