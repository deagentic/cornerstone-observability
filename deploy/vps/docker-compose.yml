services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentic_telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-telemetry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - telemetry_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telemetry} -d ${POSTGRES_DB:-agentic_telemetry}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build: ../..
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-telemetry}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agentic_telemetry}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      internal:
      alewin_net:
        aliases:
          - telemetry-api

volumes:
  telemetry_postgres_data:

networks:
  internal:
    driver: bridge
  alewin_net:
    external: true
    name: keter-biotech_alewin_net
